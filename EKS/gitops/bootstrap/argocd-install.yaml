apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# This installs ArgoCD via Helm
# Why Helm? Because we want to manage ArgoCD's own configuration
# After this is installed, ArgoCD manages everything else via GitOps
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"  # Deploy first (lowest number)
spec:
  project: default
  
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 6.0.0  # Pin to specific version
    helm:
      values: |
        # ADD THIS BLOCK - this is what actually sets the ConfigMap
        configs:
          params:
            server.insecure: "true"    # ← correct location
        
        server:
          # insecure: true  ← this does nothing in chart v6.x, remove it
          ingress:
            enabled: false
            ingressClassName: alb
            hosts:
              - argocd.glodios.com
          notifications:
            enabled: true
        
        controller:
          replicas: 1
        
        redis:
          enabled: true
        
        rbac:
          create: true
        
        serviceAccount:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true       # Delete resources if removed from Git
      selfHeal: true    # Revert manual changes
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
