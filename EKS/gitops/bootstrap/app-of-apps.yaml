apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  
  source:
    repoURL: https://github.com/Neerajj00n/PG-EKS-Gitops.git # ← CHANGE THIS
    targetRevision: main
    path: EKS/gitops/apps/   

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true       # If app is removed from Git, delete it from cluster
      selfHeal: true    # If someone manually changes cluster, revert to Git
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
