apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: celery
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  
  source:
    repoURL: https://github.com/Neerajj00n/PG-EKS-Gitops.git
    path: EKS/helm/celery/
    targetRevision: main
  
  destination:
    server: https://kubernetes.default.svc
    namespace: backend
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
      - SkipHooks=true