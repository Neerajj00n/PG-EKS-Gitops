apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  # Sync wave = deploy order (lower number = deploys first)
  annotations:
    argocd.argoproj.io/sync-wave: "-2"  # Deploy early
spec:
  project: default
  
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.9.0  # Specific version (not latest!)
    helm:
      values: |
        installCRDs: true
  
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-system
  
  syncPolicy:
    automated:
      prune: true        # Delete if removed from Git
      selfHeal: true     # Restore if manually changed
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
