replicaCount: 2

image:
  repository: 887709589787.dkr.ecr.us-east-1.amazonaws.com/production/backend
  pullPolicy: IfNotPresent
  tag: "v1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "backend"

serviceAccount:
  create: true
  annotations:
    # For IRSA - IAM Roles for Service Accounts
    eks.amazonaws.com/role-arn: "arn:aws:iam::887709589787:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/B778A621DDFFCB3B72981CE96D7179DF"
  name: ""



env:
  LOG_LEVEL: "info"
  DEBUG: "False"
  ALLOWED_HOSTS: "api.glodios.com"
  API_TIMEOUT: "30"
  MAX_CONNECTIONS: "100"
  FEATURE_FLAG_NEW_AUTH: "true"
  FEATURE_FLAG_ANALYTICS: "false"
  CACHE_TTL: "3600"
  WORKERS: "4"

# Sensitive data from AWS Secrets Manager (via ExternalSecrets)
envFrom:
  - secretRef:
      name: backend-secrets
      optional: false

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  entrypoint : "/code/docker-entrypoint.sh"
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations: {}

# AWS ALB Ingress configuration
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # If using ACM certificate
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:887709589787:certificate/66b19ef6-f639-484c-8f97-571df7bb0dd1"
    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    alb.ingress.kubernetes.io/group.name: "glodios-alb-group"
    
  hosts:
    - host: api.glodios.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Node affinity - prefer specific node groups
nodeSelector: {}

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - backend
          topologyKey: kubernetes.io/hostname

tolerations: []

# Environment variables


# Liveness and readiness probes
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Prometheus ServiceMonitor
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  scrapeTimeout: 10s

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 1


externalSecrets:
  enabled: true