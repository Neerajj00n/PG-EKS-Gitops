{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: {{ .Release.Namespace }}
  labels:
{{- include "backend.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    # Map AWS Secrets Manager keys to Kubernetes secret keys
    - secretKey: DATABASE_URL
      remoteRef:
        key: backend/database-url
    
    - secretKey: REDIS_URL
      remoteRef:
        key: backend/redis-url
    
    - secretKey: API_KEY_EXTERNAL_SERVICE
      remoteRef:
        key: backend/api-key-external

    - secretKey: JWT_SECRET
      remoteRef:
        key: backend/jwt-secret

    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: backend/db-password

    # Add more as needed...
{{- end }}
